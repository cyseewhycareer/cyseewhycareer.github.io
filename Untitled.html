<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CY see why | 價值觀探尋系統</title>
    
    <!-- 核心庫載入 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #F5F2ED;
            --text-color: #545B64;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        .font-serif-tc {
            font-family: 'Noto Serif TC', serif;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 排序動畫與樣式 */
        .sortable-ghost {
            opacity: 0.2;
            transform: scale(0.95);
        }
        
        .sortable-drag {
            cursor: grabbing !important;
            box-shadow: 0 20px 40px rgba(0,0,0,0.12);
            background: white !important;
            border-color: #545B64 !important;
            z-index: 1000;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        @media (min-width: 640px) { .card-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 768px) { .card-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (min-width: 1024px) { .card-grid { grid-template-columns: repeat(5, 1fr); } }
        @media (min-width: 1280px) { .card-grid { grid-template-columns: repeat(6, 1fr); } }

        /* 確保底部托盤不遮擋內容 */
        .main-content-pb {
            padding-bottom: 8rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // 圖示組件庫 (直接使用 SVG 以確保穩定)
        const Icons = {
            Briefcase: () => (
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
            ),
            Heart: () => (
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            ),
            Sparkles: () => (
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>
            ),
            User: () => (
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            ),
            ArrowRight: () => (
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            ),
            Grip: () => (
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>
            ),
            Trash: () => (
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
            )
        };

        const VALUE_CARDS = [
            // 工作追求
            { category: '工作追求', text: '發揮自己的天賦能力' }, { category: '工作追求', text: '有成就感' },
            { category: '工作追求', text: '有效率、有效能' }, { category: '工作追求', text: '邏輯清晰' },
            { category: '工作追求', text: '資產與金錢' }, { category: '工作追求', text: '解決他人的問題、幫助他人成長' },
            { category: '工作追求', text: '能持續自我成長' }, { category: '工作追求', text: '對他人社會有影響力' },
            { category: '工作追求', text: '能被看見、有舞台能發光' }, { category: '工作追求', text: '專業' },
            { category: '工作追求', text: '工作生活平衡' }, { category: '工作追求', text: '社會認可、受人尊重肯定' },
            { category: '工作追求', text: '追求工作品質' }, { category: '工作追求', text: '有明確的目標或方向' },
            { category: '工作追求', text: '領導團隊' }, { category: '工作追求', text: '權威身份、擁有特定地位職權' },
            { category: '工作追求', text: '擁有自己的事業' }, { category: '工作追求', text: '獨立自主' },
            { category: '工作追求', text: '創新與創造' }, { category: '工作追求', text: '隨遇而安、順勢而為' },
            { category: '工作追求', text: '有夥伴一起打拼' }, { category: '工作追求', text: '晉升的機會與速度' },
            { category: '工作追求', text: '負責、勇於承擔責任' }, { category: '工作追求', text: '有秩序與穩定環境' },
            { category: '工作追求', text: '冒險挑戰' }, { category: '工作追求', text: '安全感（可預測、掌控）' },
            { category: '工作追求', text: '追求美感或藝術' }, { category: '工作追求', text: '工作穩定性' },
            { category: '工作追求', text: '務實、重視可行性' }, { category: '工作追求', text: '清楚的流程與規範' },
            // 人際關係
            { category: '人際關係', text: '愛與被愛' }, { category: '人際關係', text: '歸屬與認同' },
            { category: '人際關係', text: '獲得父母的認同' }, { category: '人際關係', text: '有一個安穩的家' },
            { category: '人際關係', text: '深刻友誼' }, { category: '人際關係', text: '人際和諧' },
            { category: '人際關係', text: '有小孩' }, { category: '人際關係', text: '能好好照顧家人' },
            { category: '人際關係', text: '交友廣闊' }, { category: '人際關係', text: '能彼此尊重' },
            // 美德價值
            { category: '美德價值', text: '全人類的福祉' }, { category: '美德價值', text: '尊重傳統延續歷史' },
            { category: '美德價值', text: '真誠一致' }, { category: '美德價值', text: '知恩圖報' },
            { category: '美德價值', text: '不欺騙、不說謊' }, { category: '美德價值', text: '國家主權、民族意識' },
            { category: '美德價值', text: '忠誠' }, { category: '美德價值', text: '社會公益、關懷弱勢' },
            { category: '美德價值', text: '不要傷害別人' }, { category: '美德價值', text: '公平正義' },
            { category: '美德價值', text: '保護環境或動植物' },
            // 自我與生活
            { category: '自我與生活', text: '忠於自我' }, { category: '自我與生活', text: '享受生活美食' },
            { category: '自我與生活', text: '有趣的人事物' }, { category: '自我與生活', text: '內在的平靜' },
            { category: '自我與生活', text: '自由自在不受拘束' }, { category: '自我與生活', text: '健康的身體與心靈' },
            { category: '自我與生活', text: '有獨處的空間' }, { category: '自我與生活', text: '能親近大自然' },
            { category: '自我與生活', text: '自我肯定、喜歡自己' }, { category: '自我與生活', text: '低調、不張揚' },
            { category: '自我與生活', text: '規律的生活' }, { category: '自我與生活', text: '平凡的生活' },
            { category: '自我與生活', text: '信仰與靈性生活' }, { category: '自我與生活', text: '舒適的環境' },
            { category: '自我與生活', text: '自我表達與呈現' }, { category: '自我與生活', text: '追求真理與知性' },
            { category: '自我與生活', text: '保有隱私、不被打擾' }, { category: '自我與生活', text: '保持潔淨' },
            { category: '自我與生活', text: '洞察智慧' }
        ];

        const CATEGORIES = ['全部類別', '工作追求', '人際關係', '美德價值', '自我與生活'];

        const App = () => {
            const [step, setStep] = useState(1);
            const [filter, setFilter] = useState('全部類別');
            const [selectedCards, setSelectedCards] = useState([]);
            const [rankedList, setRankedList] = useState([]);
            const sortableContainerRef = useRef(null);

            // 初始隨機洗牌
            const shuffledCards = useMemo(() => {
                let arr = [...VALUE_CARDS];
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }, []);

            const filteredCards = useMemo(() => {
                if (filter === '全部類別') return shuffledCards;
                return VALUE_CARDS.filter(c => c.category === filter);
            }, [filter, shuffledCards]);

            const toggleCard = (card) => {
                const isSelected = selectedCards.some(c => c.text === card.text);
                if (isSelected) {
                    setSelectedCards(selectedCards.filter(c => c.text !== card.text));
                } else {
                    setSelectedCards([...selectedCards, card]);
                }
            };

            const proceedToRanking = () => {
                if (selectedCards.length < 5) return;
                setRankedList([...selectedCards]);
                setStep(2);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const removeCard = (text) => {
                const newList = rankedList.filter(item => item.text !== text);
                setRankedList(newList);
                setSelectedCards(selectedCards.filter(item => item.text !== text));
            };

            // 初始化 SortableJS
            useEffect(() => {
                if (step === 2 && sortableContainerRef.current) {
                    const sortable = Sortable.create(sortableContainerRef.current, {
                        animation: 350,
                        handle: '.drag-handle',
                        ghostClass: 'sortable-ghost',
                        dragClass: 'sortable-drag',
                        forceFallback: true, // 強制使用 fallback 以提高手機端相容性
                        onEnd: (evt) => {
                            const newList = [...rankedList];
                            const [movedItem] = newList.splice(evt.oldIndex, 1);
                            newList.splice(evt.newIndex, 0, movedItem);
                            setRankedList(newList);
                        }
                    });
                    return () => sortable.destroy();
                }
            }, [step, rankedList.length]);

            const getCategoryStyle = (cat) => {
                switch (cat) {
                    case '工作追求': return { color: '#8E9EAB', bg: '#8E9EAB15', icon: <Icons.Briefcase /> };
                    case '人際關係': return { color: '#B69292', bg: '#B6929215', icon: <Icons.Heart /> };
                    case '美德價值': return { color: '#95A18C', bg: '#95A18C15', icon: <Icons.Sparkles /> };
                    case '自我與生活': return { color: '#A89B8C', bg: '#A89B8C15', icon: <Icons.User /> };
                    default: return { color: '#888', bg: '#f1f1f1', icon: null };
                }
            };

            const CommonFooter = () => (
                <footer className="max-w-5xl mx-auto py-12 px-6 text-center border-t border-[#E8E4DE]/30">
                    <p className="text-[9px] tracking-[0.4em] uppercase opacity-40 font-sans">@cyseewhy.career • Value Cards Insight</p>
                    <p className="text-[10px] tracking-[0.1em] opacity-40 mt-2 font-serif-tc leading-relaxed">
                        價值導航卡由 職游 發想與設計・線上牌卡系統由 職涯諮詢師 CY 開發
                    </p>
                </footer>
            );

            return (
                <div className="min-h-screen">
                    {/* Header */}
                    <header className="bg-white border-b border-[#E8E4DE] sticky top-0 z-[60] px-6 py-4">
                        <div className="max-w-7xl mx-auto flex justify-between items-center">
                            <div>
                                <p className="text-[10px] font-sans tracking-[0.2em] opacity-40 uppercase mb-0.5">CY see why</p>
                                <h1 className="text-lg md:text-xl font-serif-tc font-bold tracking-[0.1em] text-[#4A4A4A]">價值觀探尋</h1>
                                <p className="text-[8px] tracking-[0.2em] uppercase opacity-40 font-sans">Value Card Exploration</p>
                            </div>
                            <div className="text-[11px] tracking-widest font-serif-tc opacity-60 bg-[#E8E4DE] px-4 py-1.5 rounded-full hidden sm:block">
                                {step === 1 ? `已選 ${selectedCards.length} 張` : `排列順序`}
                            </div>
                        </div>
                    </header>

                    {step === 1 ? (
                        <div className="main-content-pb">
                            <main className="max-w-7xl mx-auto px-6 py-10">
                                <div className="max-w-2xl mx-auto text-center space-y-4 mb-12 px-4">
                                    <h2 className="font-serif-tc text-lg md:text-xl tracking-[0.2em] text-[#6B7280]">「 探尋此刻真實的自己 」</h2>
                                    <p className="text-xs md:text-sm leading-relaxed opacity-60 font-light tracking-wide italic">
                                        請選取所有「有感」的牌卡，稍後我們再進行排列。
                                    </p>
                                </div>

                                {/* 分類篩選 */}
                                <div className="flex flex-wrap justify-center gap-2 mb-10 sticky top-[80px] z-40 bg-[#F5F2EDBF] backdrop-blur-sm py-2">
                                    {CATEGORIES.map(cat => (
                                        <button
                                            key={cat}
                                            onClick={() => setFilter(cat)}
                                            className={`px-4 py-1.5 rounded-full text-[11px] tracking-widest border font-serif-tc transition-all duration-300 ${
                                                filter === cat ? 'bg-[#545B64] text-white border-[#545B64]' : 'bg-white text-[#8C979A] border-[#E8E4DE]'
                                            }`}
                                        >
                                            {cat}
                                        </button>
                                    ))}
                                </div>

                                {/* 牌卡網格 */}
                                <div className="card-grid">
                                    {filteredCards.map(card => {
                                        const isSelected = selectedCards.some(c => c.text === card.text);
                                        const style = getCategoryStyle(card.category);
                                        return (
                                            <div
                                                key={card.text}
                                                onClick={() => toggleCard(card)}
                                                className={`relative cursor-pointer aspect-[3/4.2] p-4 rounded-sm border transition-all duration-500 flex flex-col justify-between group ${
                                                    isSelected ? 'border-[#545B64] bg-white shadow-lg ring-1 ring-[#545B64]/10' : 'border-[#E8E4DE] bg-white/40'
                                                }`}
                                            >
                                                <div className="flex justify-between items-start mb-2">
                                                    <div className="text-[8px] tracking-widest font-bold px-1.5 py-0.5 rounded-sm" style={{ color: style.color, backgroundColor: style.bg }}>
                                                        {card.category}
                                                    </div>
                                                    <div className="opacity-20 group-hover:opacity-60 transition-opacity" style={{ color: style.color }}>
                                                        {style.icon}
                                                    </div>
                                                </div>
                                                <div className="flex-grow flex items-center justify-center text-center font-serif-tc tracking-widest text-[13px] sm:text-[14px] leading-relaxed">
                                                    {card.text}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                                <CommonFooter />
                            </main>

                            {/* 底部懸浮已選區塊 */}
                            <div className="fixed bottom-0 left-0 w-full z-[70] bg-[#F5F2ED]/95 backdrop-blur-lg border-t border-[#E8E4DE] shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
                                <div className="max-w-7xl mx-auto px-4 py-3 flex items-center gap-2 h-16 sm:h-20">
                                    <div className="flex-shrink-0 flex flex-col items-center justify-center px-1">
                                        <span className="text-[8px] font-serif-tc opacity-50 tracking-tighter uppercase mb-0.5 leading-none">SELECTED</span>
                                        <span className="font-bold text-base sm:text-lg font-serif-tc leading-none">{selectedCards.length}</span>
                                    </div>
                                    <div className="flex-grow flex gap-2 overflow-x-auto hide-scrollbar items-center py-1">
                                        {selectedCards.length === 0 ? (
                                            <span className="text-[10px] opacity-40 tracking-widest italic font-serif-tc ml-2">尚未挑選牌卡</span>
                                        ) : (
                                            selectedCards.map(card => (
                                                <div key={card.text} className="flex-shrink-0 w-20 h-12 sm:w-24 sm:h-14 bg-white border border-[#E8E4DE] rounded-sm px-2 py-1 relative flex items-center justify-center shadow-sm">
                                                    <span className="text-[9px] sm:text-[10px] font-serif-tc text-center leading-tight tracking-wider line-clamp-2">{card.text}</span>
                                                    <button onClick={(e) => { e.stopPropagation(); toggleCard(card); }} className="absolute -top-1.5 -right-1.5 bg-[#545B64] text-white rounded-full w-4 h-4 flex items-center justify-center text-[8px] shadow-sm">✕</button>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                    <button
                                        disabled={selectedCards.length < 5}
                                        onClick={proceedToRanking}
                                        className={`h-10 sm:h-12 px-4 sm:px-6 rounded-full text-[11px] sm:text-[12px] font-serif-tc tracking-[0.2em] transition-all flex items-center gap-2 shrink-0 ${
                                            selectedCards.length >= 5 ? 'bg-[#545B64] text-white shadow-lg active:scale-95' : 'bg-[#E8E4DE] text-[#BCB0A1] cursor-not-allowed'
                                        }`}
                                    >
                                        下一步 <Icons.ArrowRight />
                                    </button>
                                </div>
                            </div>
                        </div>
                    ) : (
                        <main className="max-w-2xl mx-auto py-16 px-6 space-y-10">
                            <div className="text-center space-y-4">
                                <h2 className="font-serif-tc text-2xl tracking-[0.2em] text-[#4A4A4A]">探尋此刻真實的自己</h2>
                                <p className="text-[11px] tracking-widest opacity-50 uppercase font-sans">Refine and define your priorities</p>
                                {rankedList.length > 15 && (
                                    <div className="flex items-center justify-center gap-2 text-amber-600 bg-amber-50 py-2.5 px-6 rounded-full text-[11px] font-serif-tc tracking-wider border border-amber-100 mx-auto w-fit shadow-sm">
                                        ⚠️ 建議精簡至 10-15 張效果最佳
                                    </div>
                                )}
                                <button onClick={() => setStep(1)} className="text-[10px] tracking-[0.2em] uppercase border-b border-[#E8E4DE] pb-1 hover:text-[#545B64] transition-colors mt-4 inline-block">返回選取更多</button>
                            </div>

                            <div ref={sortableContainerRef} className="space-y-3 pb-10">
                                {rankedList.map((card, index) => {
                                    const style = getCategoryStyle(card.category);
                                    return (
                                        <div key={card.text} className="bg-white border border-[#E8E4DE] rounded-sm p-4 md:p-5 flex items-center gap-4 md:gap-8 shadow-sm transition-all group relative">
                                            <div className="font-serif-tc italic text-[11px] text-[#BCB0A1] w-4">{String(index + 1).padStart(2, '0')}</div>
                                            <div className="flex-grow">
                                                <div className="text-[15px] md:text-[16px] tracking-[0.15em] font-serif-tc text-[#4A4A4A]">{card.text}</div>
                                                <div className="flex items-center gap-2 mt-1.5 opacity-60">
                                                    <span style={{ color: style.color }}>{style.icon}</span>
                                                    <span className="text-[9px] tracking-[0.1em] font-bold" style={{ color: style.color }}>{card.category}</span>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-2 sm:gap-4">
                                                <button onClick={() => removeCard(card.text)} className="p-2 text-[#E8E4DE] hover:text-rose-400 transition-colors">
                                                    <Icons.Trash />
                                                </button>
                                                <div className="drag-handle p-3 -mr-2 cursor-grab active:cursor-grabbing opacity-30 group-hover:opacity-100 transition-opacity touch-none">
                                                    <Icons.Grip />
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            <CommonFooter />
                        </main>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
